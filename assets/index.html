<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="login.css">
</head>

<body class="bg-light">

<div class="container">

<div class="row vh-100 justify-content-center align-items-center">

<div class="col-lg-4 col-md-6 col-sm-10">

<div class="card shadow p-4 text-center">

<!-- Logo -->
<img src="tvk name.png" class="img-fluid mb-3">

<h1 class="fw-bold">செட்டிச்சாவடி</h1>
<h5 class="mb-4">உள்நுழைவு</h5>

<form onsubmit="return next()">

<input id="inp" type="text"
class="form-control mb-3"
placeholder="Password"
required>
<b><h6 id="par" style="color: red; padding-left: 10px;"></h6></b>
<button class="btn btn-dark w-100">
சமர்ப்பிக்கவும்
</button>

</form>

</div>

</div>

</div>

</div>

<script>
function next() {
      let a = document.getElementById("inp").value;
      if (a !== "" && a == 636008) {
        window.location.replace("main.html");
        return false;
      } else {
        document.getElementById("par").innerHTML="சரியான எண்ணை உள்ளிடவும்";
        // alert("சரியான எண்ணை உள்ளிடவும்");
        document.getElementById("inp").value="";
        return false;

      }
    }
</script>

</body>
</html>
